<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>TaskPet</title>

  <style>
    body {
      margin: 0;
      background: transparent;
      overflow: hidden;
      width: 100vw;
      height: 100vh;

      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;

      -webkit-app-region: drag;
    }

    .robot {
      width: 150px;
      height: 150px;
      background: #4CAF50;
      border-radius: 50%;

      display: flex;
      justify-content: center;
      align-items: center;

      font-size: 60px;
      user-select: none;
      cursor: pointer;

      animation: float 2.5s ease-in-out infinite;

      -webkit-app-region: no-drag;

      position: relative;
      z-index: 2;
    }

    .speech-bubble {
      position: absolute;

      bottom: 145px;
      left: 50%;
      transform: translateX(-50%);

      background: rgba(40, 40, 40, 0.95);
      color: white;

      padding: 10px 16px;
      border-radius: 18px;

      font-family: Arial, sans-serif;
      font-size: 14px;

      text-align: center;
      max-width: 180px;

      opacity: 0;
      visibility: hidden;

      transition: opacity 0.3s ease;

      z-index: 999;

      pointer-events: none;

      white-space: nowrap;

    }

    .speech-bubble.show {
      opacity: 1;
      visibility: visible;
    }

    @keyframes float {
      0% {
        transform: translateY(0px);
      }

      50% {
        transform: translateY(-6px);
      }

      100% {
        transform: translateY(0px);
      }
    }
  </style>
</head>

<body>

  <div class="speech-bubble" id="speechBubble"></div>

  <div class="robot" id="robot">
    🤖
  </div>

  <script>
    const robot = document.getElementById("robot");
    const speechBubble = document.getElementById("speechBubble");

    const messages = [
      "Hola 👋",
      "¿Cómo van tus tareas? 😄",
      "No olvides descansar 😴",
      "¡Tú puedes! 🚀",
      "¿Ya revisaste pendientes?"
    ];

    let bubbleTimeout;

    robot.addEventListener("click", () => {

      const randomMessage =
        messages[Math.floor(Math.random() * messages.length)];

      speechBubble.textContent = randomMessage;

      speechBubble.classList.add("show");

      clearTimeout(bubbleTimeout);

      bubbleTimeout = setTimeout(() => {
        speechBubble.classList.remove("show");
      }, 3000);

    });
  </script>

</body>
</html>
