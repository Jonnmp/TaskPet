<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TaskPet</title>

    <style>
        body {
            margin: 0;
            background: transparent;
            overflow: hidden;
            width: 100vw;
            height: 100vh; 

            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .robot {
            width: 150px;
            height: 150px;
            background: #4CAF50;
            border-radius: 50%;

            display: flex;
            justify-content: center;
            align-items: center;

            font-size: 60px;
            user-select: none;

            -webkit-app-region: drag;
        }

        .robot:hover {
            transform: scale(1.03);
            transition: 0.2s;
        }
    </style>
</head>

<body>
    <div class = "robot">
        🤖
    </div>
    
</body>
</html>
